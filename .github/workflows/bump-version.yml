name: Bump Version

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

# master への連続 push で複数ジョブが並走し同バージョンの bump PR が重複するのを防ぐ。
# cancel-in-progress: false にして最新ジョブだけ残す（キャンセルすると PR が作られない）。
concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    # バージョンバンプ / docs / ci のコミット自身はスキップして無限ループを防止
    if: |
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'ci:')
    outputs:
      new_version: ${{ steps.version.outputs.new }}
    steps:
      # actions/checkout v5.0.1
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # actions-rust-lang/setup-rust-toolchain v1.15.0
      - uses: actions-rust-lang/setup-rust-toolchain@2fcdc490d667999e01ddbbf0f2823181beef6b39
        with:
          toolchain: stable
          cache: false
          rustflags: ""

      - name: Bump patch version
        id: version
        run: |
          current=$(awk '
            $0 == "[workspace.package]" { in_workspace_package=1; next }
            /^\[/ && $0 != "[workspace.package]" { in_workspace_package=0 }
            in_workspace_package && /^version = / {
              match($0, /"[0-9.]+"/)
              print substr($0, RSTART + 1, RLENGTH - 2)
              exit
            }
          ' Cargo.toml)
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          sed -i '/^\[workspace\.package\]/,/^\[/{s/^version = "'"$current"'"/version = "'"$new"'"/}' Cargo.toml
          cargo update -p yatamux
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped: $current -> $new"

      - name: Create bump branch, tag, and PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="chore/bump-version-${{ steps.version.outputs.new }}"
          git checkout -b "$branch"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          # タグをここで作成・push する（マージコミットに依存しないため）
          git tag "v${{ steps.version.outputs.new }}"
          # 前回の失敗で同名ブランチ・タグが残っていても上書き
          git push origin "$branch" --force
          git push origin "v${{ steps.version.outputs.new }}" --force
          # PR が既存の場合はスキップ
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.new }}" \
            --body "自動バージョンバンプ PR（v${{ steps.version.outputs.new }} タグ・Release は作成済み）。" \
            --base master \
            --head "$branch" \
          || echo "PR already exists, skipping."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build & Release
    needs: bump
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ needs.bump.outputs.new_version }}
    permissions:
      contents: write
