name: Bump Version

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    # バージョンバンプ / docs / ci のコミット自身はスキップして無限ループを防止
    if: |
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'ci:')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump patch version
        id: version
        run: |
          current=$(grep '^version = ' Cargo.toml | head -1 | grep -oP '[\d.]+')
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          sed -i "s/^version = \"$current\"/version = \"$new\"/" Cargo.toml
          cargo update -p yatamux
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped: $current -> $new"

      - name: Create bump branch, tag, and PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="chore/bump-version-${{ steps.version.outputs.new }}"
          git checkout -b "$branch"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          # タグをここで作成・push する（マージコミットに依存しないため）
          git tag "v${{ steps.version.outputs.new }}"
          # 前回の失敗で同名ブランチ・タグが残っていても上書き
          git push origin "$branch" --force
          git push origin "v${{ steps.version.outputs.new }}" --force
          # GITHUB_TOKEN で push したタグは他のワークフローをトリガーしないため、手動で呼び出す
          gh workflow run release.yml --ref "v${{ steps.version.outputs.new }}" \
            --field tag="v${{ steps.version.outputs.new }}"
          # PR が既存の場合はスキップ
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.new }}" \
            --body "自動バージョンバンプ PR（v${{ steps.version.outputs.new }} タグ・Release は作成済み）。" \
            --base master \
            --head "$branch" \
          || echo "PR already exists, skipping."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
