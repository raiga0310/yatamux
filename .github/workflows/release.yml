name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.9)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.9)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      # actions/checkout v5.0.1
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        # actions-rust-lang/setup-rust-toolchain v1.15.0
        uses: actions-rust-lang/setup-rust-toolchain@2fcdc490d667999e01ddbbf0f2823181beef6b39
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          cache: false
          rustflags: ""

      - name: Cache cargo registry
        # actions/cache v5.0.1
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Compute SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "target\x86_64-pc-windows-msvc\release\yatamux.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  yatamux.exe" | Set-Content checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        # softprops/action-gh-release v2.5.0
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            target/x86_64-pc-windows-msvc/release/yatamux.exe
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
