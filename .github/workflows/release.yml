name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.9)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Compute SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "target\x86_64-pc-windows-msvc\release\yatamux.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  yatamux.exe" | Set-Content checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/x86_64-pc-windows-msvc/release/yatamux.exe
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
